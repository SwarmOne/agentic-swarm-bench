name: Publish OSS

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install hatchling pytest pytest-asyncio httpx click rich pyyaml

      - name: Build OSS staging
        run: python tools/build_oss.py --output-dir ./oss-staging

      - name: Install stripped package
        run: pip install -e "./oss-staging[dev]"

      - name: Run public test suite
        run: python -m pytest oss-staging/tests/ -x -q

      - name: Push to public repo
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        env:
          OSS_PAT: ${{ secrets.OSS_PAT }}
        run: |
          cd oss-staging
          git init -b main
          git config user.name "SwarmOne Bot"
          git config user.email "bot@swarmone.ai"
          git add -A
          git commit -m "OSS release from $(git -C .. rev-parse --short HEAD)"
          git remote add public https://x-access-token:${OSS_PAT}@github.com/SwarmOne/agentic-swarm-bench.git
          git push -f public main

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            git tag "$TAG"
            git push public "$TAG"
          fi
