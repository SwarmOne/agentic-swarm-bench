name: Publish OSS

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install hatchling pytest pytest-asyncio httpx click rich pyyaml

      - name: Build OSS staging
        run: python tools/build_oss.py --output-dir ./oss-staging

      - name: Install stripped package
        run: pip install -e "./oss-staging[dev]"

      - name: Run public test suite
        run: python -m pytest oss-staging/tests/ -x -q

      - name: Push to public repo
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        env:
          OSS_PAT: ${{ secrets.OSS_PAT }}
        run: |
          PUBLIC_URL="https://x-access-token:${OSS_PAT}@github.com/SwarmOne/agentic-swarm-bench.git"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          COMMIT_MSG="$(git log -1 --format='%s')"

          # Clone existing public repo to preserve history
          git clone "$PUBLIC_URL" public-repo
          cd public-repo
          git config user.name "SwarmOne Bot"
          git config user.email "bot@swarmone.ai"

          # Replace all tracked files with the new OSS build
          git rm -rf . > /dev/null 2>&1 || true
          rm -rf ../oss-staging/.git
          cp -a ../oss-staging/. .

          git add -A

          # Only commit and push if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to publish"
          else
            git commit -m "oss: ${COMMIT_MSG} (${SHORT_SHA})"
            git push origin main

            if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
              TAG="${GITHUB_REF#refs/tags/}"
              git tag "$TAG"
              git push origin "$TAG"
            fi
          fi
